<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistem Informasi Manajemen Klinik Sehat">
  <title>Klinik Sehat | Dashboard</title>

  <!-- PENYESUAIAN JALUR: Menembak langsung ke dalam subfolder assets/js/ sesuai visual VS Code lo -->
  <link rel="stylesheet" href="assets/js/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/js/css/style.css">
  
  <!-- Jaminan Visual: Menggunakan CDN Icon agar simbol menu langsung tampil -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    .hidden { display: none !important; }
    .auth-body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .sidebar-nav { flex: 1; overflow-y: auto; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>

<body>
  <!-- ================= LAYOUT 1: SCREEN LOGIN ================= -->
  <main id="login-section" class="auth-body hidden">
    <!-- Render otomatis via app.js -->
  </main>

  <!-- ================= LAYOUT 2: LAYOUT UTAMA SPA ================= -->
  <div id="main-layout" class="admin-shell hidden">
    <div class="sidebar-backdrop" data-sidebar-close></div>

    <!-- Sidebar adminHMD -->
    <aside class="admin-sidebar" id="sidebar-navigation" aria-label="Main navigation">
      <!-- Render otomatis via app.js -->
    </aside>

    <!-- Kanan: Main Content Canvas -->
    <div class="admin-main">
      <!-- Navbar Header -->
      <nav class="navbar admin-navbar navbar-expand bg-white">
        <div class="container-fluid px-3 px-lg-4">
          <button class="sidebar-toggle" type="button" data-sidebar-toggle aria-controls="sidebar-navigation" aria-expanded="true" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="d-none d-md-flex ms-3 flex-grow-1 align-items-center">
            <span class="status-dot" style="background-color: #22c55e; width: 10px; height: 10px; border-radius: 50%; display: inline-block;"></span>
            <span class="sidebar-footer-text text-muted ms-2">GAS API Connected v3.0 • Tahun Operasional 2026</span>
          </div>

          <div class="navbar-actions ms-auto">
            <button class="icon-button theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" title="Switch color theme">
              <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
            </button>
            
            <div class="dropdown">
              <button class="profile-button dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <img class="avatar-img avatar-sm" id="topbar-avatar" src="assets/js/images/avatar/avatar.jpg" alt="Staf">
                <span class="profile-name d-none d-sm-inline" id="topbar-username">Staf Klinik</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item text-danger" href="#" onclick="executeLogout()">Sign Out</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>

      <!-- Tempat Konten SPA Mengalir Sesuai Standar adminHMD -->
      <main class="dashboard-content">
        <div class="container-fluid px-3 px-lg-4 py-4" id="main-content-stream">
          <!-- Tampilan Halaman Suntikan SPA -->
        </div>
      </main>

      <footer class="admin-footer">
        <div class="container-fluid px-3 px-lg-4">
          <span>Copyright &copy; 2026 <strong>Klinik Sehat</strong>.</span>
          <span>Professional Clinic Dashboard.</span>
        </div>
      </footer>
    </div>
  </div>

  <!-- 1. Konfigurasi Global & Core API -->
  <script src="assets/js/config.js"></script>
  
  <!-- 2. Pustaka Pihak Ketiga (Template Bawaan) -->
  <script src="assets/js/bootstrap.bundle.min.js"></script>

  <!-- 3. Modul Aplikasi Operasional Klinik -->
<script src="assets/js/pasien.js"></script>
<script src="assets/js/dokter.js"></script>
<script src="assets/js/antrian.js"></script>
<script src="assets/js/apotek.js"></script>
<script src="assets/js/kasir.js"></script>
<script src="assets/js/rekam_medis.js"></script>
<script src="assets/js/laporan.js"></script>
  <script src="assets/js/jadwal_dokter.js"></script>
  <script src="assets/js/pengguna.js"></script>

<script src="assets/js/app.js"></script>
  <script>
    // Global variable override untuk menjinakkan main.js bawaan template agar tidak memicu 404 avatar
    window.adminHMDUser = {
      name: "Admin Klinik",
      workspace: "Klinik Sehat Operasional",
      avatar: "assets/js/images/avatar/avatar.jpg"
    };
  </script>
